# ============================================================
# 股票分析系统 Web 工作台 - Nginx 子路径片段（/stock）
# ------------------------------------------------------------
# 注意：本文件【不含 server 块】，只能被域名 server 块 include。
# 由 deploy/deploy.sh 自动注入到 ai-board.conf 的主 server 块中
# （与 ai-board 的 /board 共用同一域名 yongbo.online，且都在 443/HTTPS 上）。
#
# 部署后实际生效的两个文件：
#   - /etc/nginx/dsa-locations.conf   ← 本文件内容
#   - /etc/nginx/conf.d/ai-board.conf ← 仅新增一行 include（幂等）
# ============================================================

    # ===== 前端静态站点：子路径 /stock =====
    # 用 alias 把 /stock/ 映射到 /var/www/dsa（与 deploy.sh 的 REMOTE_DIR 一致）
    location /stock/ {
        alias /var/www/dsa/;
        index index.html;
        # 单页应用：找不到文件就回退到 /stock/index.html（回退路径必须带前缀）
        try_files $uri $uri/ /stock/index.html;
    }

    # 带哈希的静态资源长缓存；index.html 本身不缓存
    location /stock/assets/ {
        alias /var/www/dsa/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /stock/index.html {
        alias /var/www/dsa/index.html;
        add_header Cache-Control "no-cache";
    }

    # ===== 后端 API 反向代理 =====
    # 前端请求 /stock/api/v1/...，此处剥离 /stock 前缀后转发到本机后端（127.0.0.1:8000）。
    # 后端用 `docker compose up -d server` 启动并绑 127.0.0.1:8000，
    # 仅本机可访问，由 nginx 反代对外，避免后端端口直接暴露公网。
    location ^~ /stock/api/ {
        rewrite ^/stock/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 分析任务流 / Agent 对话流（SSE）需关闭代理缓冲
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
